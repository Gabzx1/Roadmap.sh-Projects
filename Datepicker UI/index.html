<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datepicker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="datepicker">
      <div class="date">
        <input type="text" class="input-date" value="dd / mm / yyyy" readonly />
        <button class="btn">
          <img src="icon/calendar.svg" alt="calendar icon" class="icon" />
        </button>
      </div>
      <div class="picker">
        <div class="month-wrapper">
          <h3 class="month">December 2025</h3>
          <button class="btn">
            <img src="icon/left.svg" alt="left arrow" class="icon" />
          </button>
          <button class="btn">
            <img src="icon/right.svg" alt="right arrow" class="icon" />
          </button>
        </div>
        <div class="week-days">
          <span class="picker__weekday">Sun</span>
          <span class="picker__weekday">Mon</span>
          <span class="picker__weekday">Tue</span>
          <span class="picker__weekday">Wed</span>
          <span class="picker__weekday">Thu</span>
          <span class="picker__weekday">Fri</span>
          <span class="picker__weekday">Sat</span>
        </div>
        <div class="items-wrapper">
          <span class="picker__day">27</span>
          <span class="picker__day">28</span>
          <span class="picker__day">29</span>
          <span class="picker__day">30</span>
          <span class="picker__day">1</span>
          <span class="picker__day">2</span>
          <span class="picker__day">3</span>
          <span class="picker__day">4</span>
          <span class="picker__day">5</span>
          <span class="picker__day">6</span>
          <span class="picker__day">7</span>
          <span class="picker__day">8</span>
          <span class="picker__day">9</span>
          <span class="picker__day">10</span>
          <span class="picker__day">11</span>
          <span class="picker__day">12</span>
          <span class="picker__day">13</span>
          <span class="picker__day">14</span>
          <span class="picker__day">15</span>
          <span class="picker__day">16</span>
          <span class="picker__day">17</span>
          <span class="picker__day">18</span>
          <span class="picker__day">19</span>
          <span class="picker__day">20</span>
          <span class="picker__day">21</span>
          <span class="picker__day">22</span>
          <span class="picker__day">23</span>
          <span class="picker__day">24</span>
          <span class="picker__day">25</span>
          <span class="picker__day">26</span>
          <span class="picker__day">27</span>
          <span class="picker__day">28</span>
          <span class="picker__day">29</span>
          <span class="picker__day">30</span>
          <span class="picker__day">31</span>
        </div>
      </div>
    </div>
  </body>
</html>
