<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datepicker UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <article class="datepicker">
        <div class="date">
          <input type="text" class="input-date" value="dd / mm / yyyy" readonly/>
          <button class="date-btn"><img src="icon/calendar.svg" alt="" class="icon"></button>
        </div>
        <div class="picker">
          <div class="picker-slider">
            <div class="month-wrapper">
              <img src="icon/left.svg" alt="" class="icon" />
              <h3>December 2025</h3>
              <img src="icon/right.svg" alt="" class="icon" />
            </div>
            <div class="week-days">
              <div class="picker__weekday">
                <p>S</p>
              </div>
              <div class="picker__weekday">
                <p>M</p>
              </div>
              <div class="picker__weekday">
                <p>T</p>
              </div>
              <div class="picker__weekday">
                <p>W</p>
              </div>
              <div class="picker__weekday">
                <p>T</p>
              </div>
              <div class="picker__weekday">
                <p>F</p>
              </div>
              <div class="picker__weekday">
                <p>S</p>
              </div>
            </div>
          </div>
          <div class="items-wrapper">
            <div class="picker__day"></div>
            <div class="picker__day"></div>
            <div class="picker__day"></div>
            <div class="picker__day"></div>
            <div class="picker__day">
              <p>1</p>
            </div>
            <div class="picker__day">
              <p>2</p>
            </div>
            <div class="picker__day">
              <p>3</p>
            </div>
            <div class="picker__day">
              <p>4</p>
            </div>
            <div class="picker__day">
              <p>5</p>
            </div>
            <div class="picker__day">
              <p>6</p>
            </div>
            <div class="picker__day">
              <p>7</p>
            </div>
            <div class="picker__day">
              <p>8</p>
            </div>
            <div class="picker__day">
              <p>9</p>
            </div>
            <div class="picker__day">
              <p>10</p>
            </div>
            <div class="picker__day">
              <p>11</p>
            </div>
            <div class="picker__day">
              <p>12</p>
            </div>
            <div class="picker__day">
              <p>13</p>
            </div>
            <div class="picker__day">
              <p>14</p>
            </div>
            <div class="picker__day">
              <p>15</p>
            </div>
            <div class="picker__day">
              <p>16</p>
            </div>
            <div class="picker__day">
              <p>17</p>
            </div>
            <div class="picker__day">
              <p>18</p>
            </div>
            <div class="picker__day">
              <p>19</p>
            </div>
            <div class="picker__day">
              <p>20</p>
            </div>
            <div class="picker__day">
              <p>21</p>
            </div>
            <div class="picker__day">
              <p>22</p>
            </div>
            <div class="picker__day">
              <p>23</p>
            </div>
            <div class="picker__day">
              <p>24</p>
            </div>
            <div class="picker__day">
              <p>25</p>
            </div>
            <div class="picker__day">
              <p>26</p>
            </div>
            <div class="picker__day">
              <p>27</p>
            </div>
            <div class="picker__day">
              <p>28</p>
            </div>
            <div class="picker__day">
              <p>29</p>
            </div>
            <div class="picker__day">
              <p>30</p>
            </div>
            <div class="picker__day">
              <p>31</p>
            </div>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
